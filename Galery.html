<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEST 2</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/galeryStyle.css">
    <script src="scripts/scripts.js"></script>
    <link rel="shortcut icon" href="assets/logos/logo.png">

<body>
    <div class="container">

        <!----SLIDER-!--->

        <div class="sliders">
            <div class="fade">
                <img src="./assets/slider/1.jpg" class="sliderImage"/>
            </div>

                <p class="titulosGalery">Galería</>
            </div>
            <div class="arrow">
                <a href="#modalidadesZone"><img src="./assets/images/icons/DoubleArrow.png"></a>
            </div>
        </div>

        <!----BARRA DE NAVEGACIÓN!---->
        
        <div class="sidebar">

                <a href="index.html">
                    <img src="./assets/logos/logo.png" alt="Logo institucional.">

            <div class="sidebarMenu">
                <button onclick="extendDiv('.sidebar')">

            <div class="options">
                <div class="modalidadesDesplegable">

                <a href="#galeriaZone">Galería</a>
                <a href="#historiaZone">Historia institucional</a>
            </div>
        </div>

        <!----CONTENIDO!---->

        <div class="conteinerFondoGalery">
            <div class="recuadro1Galery"></div>
        </div>
        
    <!--Scripts a ejecutar al cargar la pagina.-->
    <script>
        showSlides(["slideimg1", "slideimg2", "slideimg3", "slideimg4"], 6000, 0);

    <img src="https://picsum.photos/id/684/600/400" alt="">
