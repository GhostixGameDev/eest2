<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números al Costado</title>
    <link rel="stylesheet" href="personal.css">
</head>
<body>

    <div class="contenedor">
        <div class="linea">
            <span class="numero">1</span>
            <span class="texto">Este es un texto que puede ocupar varias líneas según el tamaño de la pantalla.</span>
        </div>
        <div class="linea">
            <span class="numero">2</span>
            <span class="texto">Aquí hay otra línea de texto que también se ajustará a la pantalla.</span>
        </div>
        <div class="linea">
            <span class="numero">3</span>
            <span class="texto">Y esta es la tercera línea de texto, que se comporta igual.</span>
        </div>
    </div>

</body>
</html>
