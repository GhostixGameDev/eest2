<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEST 2</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/scripts.js"></script>
    <link rel="shortcut icon" href="assets/logos/logo.png">
</head>
<body>
    <div class="container">
        <!----SLIDER-!--->
        <div class="sliders">
            <div id="slideimg1" class="fade">
                <img src="assets/slider/1.jpg" class="sliderImage"/>
            </div>

            <div id="slideimg2" class="fade">
                <img src="assets/slider/2.jpeg" class="sliderImage"/>
            </div>

            <div id="slideimg3" class="fade">
                <img src="assets/slider/3.jpeg" class="sliderImage"/>
            </div>

            <div id="slideimg4" class="fade">
                <img src="assets/slider/4.jpg" class="sliderImage"/>
            </div>
            <div class="logoContainer">
                <div class="logo">
                    <img src="assets/logos/white.png" alt="Logo">
                </div>
                <div class="text">
                    Escuela educación</br>
                    Secundaria Técnica N°2</br>
                </div>
            </div>
            <div class="arrow">
                <a href="#modalidadesZone"><img src="./assets/images/DoubleArrow.png"></a>
                
            </div>
        </div>
        <!----BARRA DE NAVEGACIÓN!---->
        <div class="sidebar">
            <div class="sidebarLogo">
                <a href="">
                    <img src="assets/logos/logo.png" alt="Logo institucional.">
                </a>
            </div>
            <div class="sidebarMenu">
                <button onclick="extendMenu()">
                    <img src="assets/images/BotonMenu.png">
                    <p>MENU</p>
                </button>
            </div>
            <div class="options">
                <div class="modalidadesDesplegable">
                    <div class="modalidadesButton">
                        <button onclick="extendModalidades()">Tecnicaturas <img src="./assets/images/arrow.png"></button>
                    </div>
                    <div class="modalidades">
                        <a>Programación</a>
                        <a>Informatica</a>
                    </div>
                </div>
                <a class="ubicacion">Ubicación</a>
                <a class="galeria">Galería</a>
                <a class="historia">Historia institucional</a>
            </div>
        </div>
        <!----CONTENIDO!---->
       
        <div class="paginaInformatica">  

        </div>
        <div class="modalidadesContainer">
            
           
        </div>
    </div>
</body>
</html>
